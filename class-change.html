<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="https://rakutama-tokyo.com/Pictures/favicon.jpeg" type="image/jpeg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>クラス・コース変更 申請フォーム | 楽珠そろばん教室</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#22C55E',
            accent: '#4A96AE',
          },
          fontFamily: {
            sans: ['Noto Sans JP', 'sans-serif'],
            display: ['Zen Kaku Gothic New', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; background-color: #F7FBFA; }
    .font-display { font-family: 'Zen Kaku Gothic New', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-[#F7FBFA]">

  <!-- Sticky Header -->
  <header class="sticky top-0 z-50 bg-white shadow-sm">
    <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="https://rakutama-tokyo.com/">
        <img src="https://rakutama-tokyo.com/Pictures/title.png" alt="楽珠そろばん教室" class="h-10 object-contain" />
      </a>
      <span class="hidden md:block text-sm font-medium text-gray-600">楽珠そろばん教室 各種申込フォーム</span>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-8">

    <!-- Back link -->
    <a href="index.html" class="inline-flex items-center gap-1 text-sm text-gray-500 hover:text-gray-700 mb-6 transition">
      <i class="fa-solid fa-arrow-left text-xs"></i>
      トップに戻る
    </a>

    <!-- Form Card -->
    <div id="form-card" class="bg-white rounded-2xl shadow-md p-6 md:p-8">
      <div class="mb-4">
        <h1 class="text-xl font-black text-gray-800 font-display mb-2">クラス・コース変更 申請フォーム</h1>
        <p class="text-sm text-gray-500">クラスやコースの変更をご希望の方はこちらからお申し込みください。内容を確認の上、担当者よりご連絡いたします。</p>
      </div>

      <!-- Notice Box -->
      <div id="notice-box" class="mb-6 bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 flex gap-2">
        <i class="fa-solid fa-triangle-exclamation text-amber-500 text-sm mt-0.5 flex-shrink-0"></i>
        <p id="notice-text" class="text-xs text-amber-700">※コース変更は翌月分からとなります。変更希望の前月10日までにお申し込みください。</p>
      </div>

      <!-- Error Box -->
      <div id="error-box" class="hidden mb-4 bg-red-50 border border-red-300 text-red-700 rounded-xl px-4 py-3 text-sm"></div>

      <!-- Student Lookup -->
      <div class="mb-6 p-4 bg-gray-50 rounded-xl border border-gray-200">
        <label class="block text-sm font-medium text-gray-700 mb-2">生徒番号</label>
        <div class="flex gap-2">
          <input type="text" id="student-number" placeholder="例：A0000"
            class="min-w-0 flex-1 border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-300 focus:border-green-400" />
          <button type="button" id="lookup-btn"
            class="flex-shrink-0 border-2 border-green-500 text-green-600 font-bold text-sm px-4 py-2 rounded-lg hover:bg-green-50 transition font-display flex items-center gap-2">
            <span id="lookup-text">検索</span>
            <i id="lookup-spinner" class="fa-solid fa-spinner fa-spin hidden text-xs"></i>
          </button>
        </div>
        <div id="lookup-error" class="hidden mt-2 text-xs text-red-600"></div>

        <!-- Student Info Card -->
        <div id="student-info" class="hidden mt-3 bg-white border border-green-200 rounded-lg p-3">
          <div class="flex items-center gap-2 mb-2">
            <i class="fa-solid fa-circle-check text-green-500 text-sm"></i>
            <span class="text-xs font-bold text-green-600">生徒情報が見つかりました</span>
          </div>
          <div class="grid grid-cols-2 gap-2">
            <div class="bg-gray-50 rounded-lg p-2">
              <div class="text-xs text-gray-400 mb-0.5">教室名</div>
              <div id="info-classroom" class="text-sm font-medium text-gray-800"></div>
            </div>
            <div class="bg-gray-50 rounded-lg p-2">
              <div class="text-xs text-gray-400 mb-0.5">受講中クラス</div>
              <div id="info-jugyo" class="text-sm font-medium text-gray-800"></div>
            </div>
          </div>
        </div>
      </div>

      <form id="change-form" novalidate>

        <!-- Section: 変更内容 -->
        <div class="mb-8">
          <div class="mb-4">
            <span class="text-xs font-black border-2 border-[#4A96AE] text-[#4A96AE] rounded-full px-4 py-1 font-display">変更内容</span>
          </div>

          <!-- 変更種別 -->
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-2">変更種別 <span class="text-red-500">*</span></label>
            <div class="flex gap-4">
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" name="change-type" id="type-course" value="コース変更" checked
                  class="accent-green-500 w-4 h-4" />
                <span class="text-sm text-gray-700">コース変更</span>
              </label>
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" name="change-type" id="type-class" value="クラス変更"
                  class="accent-green-500 w-4 h-4" />
                <span class="text-sm text-gray-700">クラス変更</span>
              </label>
            </div>
          </div>

          <!-- 変更希望内容 -->
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">変更希望内容 <span class="text-red-500">*</span></label>
            <textarea id="change-request" rows="4" required
              placeholder="例：週1回→週2回、月曜クラス→水曜クラス など、ご希望の変更内容をご記入ください"
              class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-300 focus:border-green-400 resize-y"></textarea>
          </div>

          <!-- 希望変更時期 -->
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">希望変更時期 <span class="text-red-500">*</span></label>
            <div id="timing-container"></div>
          </div>

          <!-- 備考 -->
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">備考 <span class="text-gray-400 text-xs font-normal">任意</span></label>
            <textarea id="notes" rows="3"
              placeholder="その他ご希望・ご質問などがあればご記入ください"
              class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-300 focus:border-green-400 resize-y"></textarea>
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="submit-btn" disabled
          class="w-full bg-green-500 hover:bg-green-600 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-black text-base py-3 rounded-full shadow-md transition font-display flex items-center justify-center gap-2">
          <span id="submit-text">送信する</span>
          <i id="submit-spinner" class="fa-solid fa-spinner fa-spin hidden"></i>
        </button>
        <p id="submit-hint" class="text-xs text-center mt-2 text-amber-600 font-medium"><i class="fa-solid fa-triangle-exclamation mr-1"></i>上の生徒番号欄で「検索」を押してから送信してください</p>

      </form>
    </div>

    <!-- Success Screen -->
    <div id="success-screen" class="hidden bg-white rounded-2xl shadow-md p-8 text-center">
      <div class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-4">
        <i class="fa-solid fa-check text-green-500 text-2xl"></i>
      </div>
      <h2 class="text-xl font-black text-gray-800 font-display mb-3">送信が完了しました</h2>
      <p class="text-sm text-gray-500 mb-6">クラス・コース変更のお申し込みを受け付けました。内容を確認の上、担当者よりご連絡いたします。</p>
      <a href="index.html"
        class="inline-block bg-green-500 hover:bg-green-600 text-white font-black text-sm py-2.5 px-8 rounded-full shadow-md transition font-display">
        トップに戻る
      </a>
    </div>

  </main>

  <footer class="text-center py-8 text-xs text-gray-400">
    <p>&copy; 2026 Alpha-Brain LLC.</p>
  </footer>

  <script>
    const API_BASE = 'https://rakutama-kintone.k-ariyama.workers.dev';

    const NOTICES = {
      course: '※コース変更は翌月分からとなります。変更希望の前月10日までにお申し込みください。',
      class:  '※クラス変更は翌週月曜日以降から可能です。ご希望の開始日を選択してください。',
    };

    const INPUT_CLASS = 'w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-300 focus:border-green-400 bg-white';

    // Next Monday (>= 7 days from today)
    function nextMondayDate() {
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      const day = d.getDay(); // 0=Sun … 6=Sat
      const daysUntilNextMonday = (8 - day) % 7 || 7; // always ≥7 days
      d.setDate(d.getDate() + daysUntilNextMonday);
      return d;
    }

    function toYMD(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const dd = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${dd}`;
    }

    function buildCourseSelect() {
      const select = document.createElement('select');
      select.id = 'desired-timing';
      select.required = true;
      select.className = INPUT_CLASS;
      const placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.textContent = '選択してください';
      select.appendChild(placeholder);
      const now = new Date();
      // 締め日（10日）を過ぎていれば翌々月から、そうでなければ翌月から
      const startOffset = now.getDate() > 10 ? 2 : 1;
      for (let i = startOffset; i <= startOffset + 2; i++) {
        const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
        const label = `${d.getFullYear()}年${d.getMonth() + 1}月から`;
        const option = document.createElement('option');
        option.value = label;
        option.textContent = label;
        select.appendChild(option);
      }
      return select;
    }

    function buildClassDateInput() {
      const input = document.createElement('input');
      input.type = 'date';
      input.id = 'desired-timing';
      input.required = true;
      input.className = INPUT_CLASS;
      const minDate = nextMondayDate();
      input.min = toYMD(minDate);
      return input;
    }

    function getChangeType() {
      return document.querySelector('input[name="change-type"]:checked')?.value || 'コース変更';
    }

    function updateTimingField() {
      const container = document.getElementById('timing-container');
      container.innerHTML = '';
      if (getChangeType() === 'クラス変更') {
        container.appendChild(buildClassDateInput());
      } else {
        container.appendChild(buildCourseSelect());
      }
    }

    function updateNotice() {
      const key = getChangeType() === 'クラス変更' ? 'class' : 'course';
      document.getElementById('notice-text').textContent = NOTICES[key];
    }

    // Init
    updateTimingField();

    // Radio change
    document.querySelectorAll('input[name="change-type"]').forEach(radio => {
      radio.addEventListener('change', () => {
        updateNotice();
        updateTimingField();
      });
    });

    let studentData = null;

    // Lookup
    document.getElementById('lookup-btn').addEventListener('click', async () => {
      const studentNumber = document.getElementById('student-number').value.trim();
      const lookupError = document.getElementById('lookup-error');
      const studentInfo = document.getElementById('student-info');
      const lookupBtn = document.getElementById('lookup-btn');
      const lookupText = document.getElementById('lookup-text');
      const lookupSpinner = document.getElementById('lookup-spinner');

      lookupError.classList.add('hidden');
      studentInfo.classList.add('hidden');
      studentData = null;
      document.getElementById('submit-btn').disabled = true;
      document.getElementById('submit-hint').classList.remove('hidden');

      if (!studentNumber) {
        lookupError.textContent = '生徒番号を入力してください';
        lookupError.classList.remove('hidden');
        return;
      }

      lookupBtn.disabled = true;
      lookupText.textContent = '検索中...';
      lookupSpinner.classList.remove('hidden');

      try {
        const response = await fetch(`${API_BASE}/api/lookup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ studentNumber }),
        });

        if (!response.ok) {
          if (response.status === 404) {
            throw new Error('生徒番号が見つかりませんでした。番号をご確認ください。');
          }
          throw new Error(`エラーが発生しました（${response.status}）`);
        }

        const data = await response.json();
        studentData = data;
        const s = data.student;

        document.getElementById('info-classroom').textContent = s.classroom || '―';
        document.getElementById('info-jugyo').textContent = s.jugyoIds && s.jugyoIds.length > 0 ? s.jugyoIds.join('、') : '―';
        studentInfo.classList.remove('hidden');
        document.getElementById('submit-btn').disabled = false;
        document.getElementById('submit-hint').classList.add('hidden');

      } catch (err) {
        lookupError.textContent = err.message || '検索中にエラーが発生しました。';
        lookupError.classList.remove('hidden');
      } finally {
        lookupBtn.disabled = false;
        lookupText.textContent = '検索';
        lookupSpinner.classList.add('hidden');
      }
    });

    document.getElementById('student-number').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('lookup-btn').click();
      }
    });

    // Form submission
    document.getElementById('change-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const errorBox = document.getElementById('error-box');
      errorBox.classList.add('hidden');
      errorBox.textContent = '';

      const changeType = getChangeType();
      const changeRequest = document.getElementById('change-request').value.trim();
      const desiredTiming = document.getElementById('desired-timing').value;
      const notes = document.getElementById('notes').value.trim();
      const studentNumber = document.getElementById('student-number').value.trim();

      const errors = [];
      if (!studentData) errors.push('生徒番号を検索してください');
      if (!changeRequest) errors.push('変更希望内容を入力してください');
      if (!desiredTiming) errors.push('希望変更時期を選択してください');

      if (errors.length > 0) {
        errorBox.innerHTML = errors.join('<br />');
        errorBox.classList.remove('hidden');
        errorBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
      }

      const s = studentData.student;
      const submitBtn = document.getElementById('submit-btn');
      const submitText = document.getElementById('submit-text');
      const submitSpinner = document.getElementById('submit-spinner');
      submitBtn.disabled = true;
      submitText.textContent = '送信中...';
      submitSpinner.classList.remove('hidden');

      try {
        const response = await fetch(`${API_BASE}/api/class-change`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            生徒番号: studentNumber,
            請求ID: s.billingId,
            教室名: s.classroom,
            氏: s.familyName,
            名: s.givenName,
            現在の授業ID: s.jugyoIds ? s.jugyoIds.join('、') : '',
            変更種別: changeType,
            変更希望内容: changeRequest,
            希望時期: desiredTiming,
            備考: notes,
          }),
        });

        if (!response.ok) {
          const data = await response.json().catch(() => ({}));
          throw new Error(data.error || data.message || `送信に失敗しました（${response.status}）`);
        }

        document.getElementById('form-card').classList.add('hidden');
        document.getElementById('success-screen').classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });

      } catch (err) {
        errorBox.textContent = err.message || '送信中にエラーが発生しました。しばらく経ってから再度お試しください。';
        errorBox.classList.remove('hidden');
        errorBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
        submitBtn.disabled = false;
        submitText.textContent = '送信する';
        submitSpinner.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
