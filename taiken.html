<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="https://rakutama-tokyo.com/Pictures/favicon.jpeg" type="image/jpeg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>体験授業 申込フォーム | 楽珠そろばん教室</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#22C55E',
            accent: '#4A96AE',
          },
          fontFamily: {
            sans: ['Noto Sans JP', 'sans-serif'],
            display: ['Zen Kaku Gothic New', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; background-color: #F7FBFA; }
    .font-display { font-family: 'Zen Kaku Gothic New', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-[#F7FBFA]">

  <!-- Sticky Header -->
  <header class="sticky top-0 z-50 bg-white shadow-sm">
    <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="https://rakutama-tokyo.com/">
        <img src="https://rakutama-tokyo.com/Pictures/title.png" alt="楽珠そろばん教室" class="h-10 object-contain" />
      </a>
      <span class="hidden md:block text-sm font-medium text-gray-600">楽珠そろばん教室 各種申込フォーム</span>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-8">

    <!-- Back link -->
    <a href="index.html" class="inline-flex items-center gap-1 text-sm text-gray-500 hover:text-gray-700 mb-6 transition">
      <i class="fa-solid fa-arrow-left text-xs"></i>
      トップに戻る
    </a>

    <!-- Form Card -->
    <div id="form-card" class="bg-white rounded-2xl shadow-md p-6 md:p-8">
      <div class="mb-6">
        <h1 class="text-xl font-black text-gray-800 font-display mb-2">体験授業 申込フォーム</h1>
        <p class="text-sm text-gray-500">無料体験授業のお申し込みです。ご記入後、担当者よりご連絡いたします。</p>
      </div>

      <!-- Error Box -->
      <div id="error-box" class="hidden mb-4 bg-red-50 border border-red-300 text-red-700 rounded-xl px-4 py-3 text-sm"></div>

      <form id="taiken-form" novalidate>

        <!-- Section: お子様の情報 -->
        <div class="mb-8">
          <div class="mb-4">
            <span class="text-xs font-black border-2 border-[#4A96AE] text-[#4A96AE] rounded-full px-4 py-1 font-display">お子様の情報</span>
          </div>

          <!-- 氏名 -->
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">お子様のお名前 <span class="text-red-500">*</span></label>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <input type="text" id="family-name" placeholder="氏（姓）" required
                  class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-300 focus:border-green-400" />
              </div>
              <div>
                <input type="text" id="given-name" placeholder="名（名）" required
                  class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-300 focus:border-green-400" />
              </div>
            </div>
          </div>

          <!-- フリガナ -->
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">フリガナ</label>
            <input type="text" id="furigana" placeholder="カタカナでご入力ください"
              class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-300 focus:border-green-400" />
          </div>

          <!-- 学年 -->
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">学年</label>
            <select id="grade"
              class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-300 focus:border-green-400 bg-white">
              <option value="">選択してください</option>
              <option>年少</option>
              <option>年中</option>
              <option>年長</option>
              <option>小1</option>
              <option>小2</option>
              <option>小3</option>
              <option>小4</option>
              <option>小5</option>
              <option>小6</option>
              <option>中1</option>
              <option>中2</option>
              <option>中3</option>
              <option>その他</option>
            </select>
          </div>

          <!-- そろばん経験 -->
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-2">そろばん経験</label>
            <div class="flex gap-6">
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" name="experience" value="なし" checked class="accent-green-500" />
                <span class="text-sm">なし</span>
              </label>
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" name="experience" value="あり" class="accent-green-500" />
                <span class="text-sm">あり</span>
              </label>
            </div>
          </div>

          <!-- 級・段 (shown when experience=あり) -->

            <label class="block text-sm font-medium text-gray-700 mb-1">級・段</label>

        <!-- Section: 保護者・連絡先 -->
        <div class="mb-8">
          <div class="mb-4">
            <span class="text-xs font-black border-2 border-[#4A96AE] text-[#4A96AE] rounded-full px-4 py-1 font-display">保護者・連絡先</span>
          </div>

          <!-- メールアドレス -->
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">メールアドレス <span class="text-red-500">*</span></label>
            <input type="email" id="email" placeholder="例：example@email.com" required
              class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-300 focus:border-green-400" />
          </div>

          <!-- 電話番号 -->
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">電話番号 <span class="text-gray-400 text-xs font-normal">任意</span></label>
            <input type="tel" id="tel" placeholder="例：090-1234-5678"
              class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-300 focus:border-green-400" />
          </div>

          <!-- 住所 -->
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">住所 <span class="text-gray-400 text-xs font-normal">任意</span></label>
            <input type="text" id="address" placeholder="例：姫路市岡田333-3"
              class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-300 focus:border-green-400" />
          </div>
        </div>

        <!-- Section: 体験希望 -->
        <div class="mb-8">
          <div class="mb-4">
            <span class="text-xs font-black border-2 border-[#4A96AE] text-[#4A96AE] rounded-full px-4 py-1 font-display">体験希望</span>
          </div>

          <!-- 希望教室 -->
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">希望教室 <span class="text-red-500">*</span></label>
            <select id="classroom" required
              class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-300 focus:border-green-400 bg-white">
              <option value="">選択してください</option>
              <option>太子太田教室</option>
              <option>浜の宮教室</option>
              <option>安室教室</option>
              <option>高浜教室</option>
              <option>飾東教室</option>
              <option>飾磨中島教室</option>
              <option>個別</option>
              <option>オンライン海外</option>
              <option>オンライン国内</option>
              <option>明石駅前教室</option>
              <option>土山教室</option>
              <option>住吉教室</option>
              <option>大久保南教室</option>
              <option>金ヶ崎教室</option>
              <option>西明石教室</option>
              <option>二階町教室</option>
              <option>荒川本部教室</option>
              <option>北条教室</option>
              <option>花田教室</option>
              <option>青山教室</option>
              <option>手柄教室</option>
              <option>八幡教室</option>
              <option>糸引教室</option>
              <option>広峰教室</option>
              <option>英賀保教室</option>
              <option>西飾磨教室</option>
              <option>白浜教室</option>
              <option>広畑教室</option>
              <option>別所教室</option>
              <option>鷺洲校</option>
              <option>清水校</option>
              <option>大淀校</option>
              <option>中津校</option>
              <option>扇町校</option>
              <option>南森町校</option>
              <option>蒲生四丁目校</option>
              <option>関目高殿校</option>
              <option>野田校</option>

          </div>

          <!-- 開講クラス一覧 -->
          <div id="schedule-section" class="hidden mb-4">
            <div class="text-xs font-medium text-gray-500 mb-2">この教室の開講クラス</div>
            <div id="schedule-spinner" class="hidden text-sm text-gray-400 flex items-center gap-2 py-1">

          </div>

          <!-- 希望日時 -->
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">体験希望日時 <span class="text-red-500">*</span></label>
            <p class="text-xs text-gray-500 mb-3">希望教室を選ぶと、その教室の<span class="whitespace-nowrap">開講曜日・時間</span>だけが選べます（<strong>2026年6月以降</strong>の日付のみ）。第1希望・第2希望をそれぞれお選びください。</p>
            <div class="space-y-4">
              <div class="rounded-xl border border-gray-200 p-4 bg-gray-50/60">
                <p class="text-sm font-bold text-gray-800 mb-3">第1希望</p>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  <div>
                    <label for="pref1-date" class="block text-xs text-gray-500 mb-1">日付</label>
                    <select id="pref1-date" required

                      <option value="">選択してください</option>
                    </select>
                  </div>
                  <div>
                    <label for="pref1-time" class="block text-xs text-gray-500 mb-1">時間</label>
                    <select id="pref1-time" required
                      class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-300 focus:border-green-400 bg-white">
                      <option value="">選択してください</option>
                    </select>
                  </div>
                </div>
              </div>
              <div class="rounded-xl border border-gray-200 p-4 bg-gray-50/60">
                <p class="text-sm font-bold text-gray-800 mb-3">第2希望</p>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  <div>
                    <label for="pref2-date" class="block text-xs text-gray-500 mb-1">日付</label>
                    <select id="pref2-date" required
                      class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-300 focus:border-green-400 bg-white">
                      <option value="">選択してください</option>
                    </select>
                  </div>
                  <div>
                    <label for="pref2-time" class="block text-xs text-gray-500 mb-1">時間</label>
                    <select id="pref2-time" required
                      class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-300 focus:border-green-400 bg-white">
                      <option value="">選択してください</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- 備考 -->
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">備考 <span class="text-gray-400 text-xs font-normal">任意</span></label>

              placeholder="ご質問・その他お気軽にどうぞ"

          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="submit-btn"
          class="w-full bg-amber-500 hover:bg-amber-600 text-white font-black text-base py-3 rounded-full shadow-md transition font-display flex items-center justify-center gap-2">
          <span id="submit-text">送信する</span>
          <i id="submit-spinner" class="fa-solid fa-spinner fa-spin hidden"></i>
        </button>

      </form>
    </div>

    <!-- Success Screen (hidden initially) -->
    <div id="success-screen" class="hidden bg-white rounded-2xl shadow-md p-8 text-center">
      <div class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-4">
        <i class="fa-solid fa-check text-green-500 text-2xl"></i>
      </div>
      <h2 class="text-xl font-black text-gray-800 font-display mb-3">送信が完了しました</h2>
      <p class="text-sm text-gray-500 mb-6">体験授業のお申し込みを受け付けました。担当者よりご連絡いたします。</p>
      <a href="index.html"
        class="inline-block bg-amber-500 hover:bg-amber-600 text-white font-black text-sm py-2.5 px-8 rounded-full shadow-md transition font-display">
        トップに戻る
      </a>
    </div>

  </main>

  <footer class="text-center py-8 text-xs text-gray-400">
    <p>&copy; 2026 Alpha-Brain LLC.</p>
  </footer>

  <script>
    const API_BASE = 'https://rakutama-kintone.k-ariyama.workers.dev';

    const FALLBACK_JUGYO_BY_CLASSROOM = {};

    const JP_TO_DAY = { '日': 0, '月': 1, '火': 2, '水': 3, '木': 4, '金': 5, '土': 6 };

    let lastJugyoByDay = null;

    function parseJugyoClassesToSchedule(classList) {
      const byDay = new Map();
      (classList || []).forEach(({ name }) => {
        const m = String(name).match(/\(([月火水木金土日])\)(\d{1,2})時/);
        if (!m) return;
        const day = JP_TO_DAY[m[1]];
        const t = `${String(Number(m[2])).padStart(2, '0')}:00`;
        if (!byDay.has(day)) byDay.set(day, new Set());
        byDay.get(day).add(t);
      });
      return byDay;
    }

    function buildDateSelectForSchedule(sel, allowedDays, noClassroomYet) {
      const wdays = ['日', '月', '火', '水', '木', '金', '土'];
      const daysAhead = 90;
      const earliest = new Date(2026, 5, 1);
      earliest.setHours(0, 0, 0, 0);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const base = today < earliest ? new Date(earliest) : new Date(today);
      sel.innerHTML = '';
      const ph = document.createElement('option');
      ph.value = '';
      if (allowedDays && allowedDays.size) ph.textContent = '選択してください';
      else if (noClassroomYet) ph.textContent = '先に希望教室を選択してください';
      else ph.textContent = '開講情報を取得できませんでした';
      sel.appendChild(ph);
      if (!allowedDays || !allowedDays.size) return;
      for (let i = 0; i < daysAhead; i++) {
        const d = new Date(base);
        d.setDate(base.getDate() + i);
        if (!allowedDays.has(d.getDay())) continue;
        const label = `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日(${wdays[d.getDay()]})`;
        const opt = document.createElement('option');
        opt.value = label;
        opt.textContent = label;
        sel.appendChild(opt);
      }
    }

    function buildTimeSelectForChosenDate(timeSel, byDay, dateLabel) {
      timeSel.innerHTML = '';
      const ph = document.createElement('option');
      ph.value = '';
      ph.textContent = '選択してください';
      timeSel.appendChild(ph);
      if (!byDay || !byDay.size || !dateLabel) return;
      const m = dateLabel.match(/\(([月火水木金土日])\)$/);
      if (!m) return;
      const day = JP_TO_DAY[m[1]];
      const times = byDay.get(day);
      if (!times || !times.size) return;
      [...times].sort().forEach(t => {
        const opt = document.createElement('option');
        opt.value = t;
        opt.textContent = t;
        timeSel.appendChild(opt);
      });
    }

    function applyPreferenceDropdownsForSchedule(byDay, noClassroomYet) {
      lastJugyoByDay = (byDay && byDay.size) ? byDay : null;
      const allowed = lastJugyoByDay ? new Set(lastJugyoByDay.keys()) : null;
      buildDateSelectForSchedule(document.getElementById('pref1-date'), allowed, noClassroomYet);
      buildDateSelectForSchedule(document.getElementById('pref2-date'), allowed, noClassroomYet);
      buildTimeSelectForChosenDate(document.getElementById('pref1-time'), lastJugyoByDay, '');
      buildTimeSelectForChosenDate(document.getElementById('pref2-time'), lastJugyoByDay, '');
    }

    function mergePreferredDatetimeForKintone() {
      const d1 = document.getElementById('pref1-date').value.trim();
      const t1 = document.getElementById('pref1-time').value.trim();
      const d2 = document.getElementById('pref2-date').value.trim();
      const t2 = document.getElementById('pref2-time').value.trim();
      if (!d1 || !t1 || !d2 || !t2) return '';
      return `第1希望：${d1} ${t1} ／ 第2希望：${d2} ${t2}`;
    }

    function renderJugyoBadges(listEl, classes, usedFallback) {
      listEl.innerHTML = '';
      classes.forEach(cls => {
        const badge = document.createElement('span');
        badge.className = 'inline-block bg-blue-50 border border-blue-200 text-blue-700 text-xs font-medium rounded-full px-3 py-1';
        badge.textContent = cls.name;
        listEl.appendChild(badge);
      });
      if (classes.length === 0) {
        listEl.innerHTML = '<span class="text-xs text-gray-400">開講中のクラスが見つかりませんでした</span>';
      } else if (usedFallback) {
        const note = document.createElement('p');
        note.className = 'w-full text-[11px] text-gray-400 mt-2';
        note.textContent = '※最新の空き状況は別途ご確認ください（一覧は参考表示です）';
        listEl.appendChild(note);
      }
    }

    document.getElementById('pref1-date').addEventListener('change', function () {
      buildTimeSelectForChosenDate(document.getElementById('pref1-time'), lastJugyoByDay, this.value);
    });
    document.getElementById('pref2-date').addEventListener('change', function () {
      buildTimeSelectForChosenDate(document.getElementById('pref2-time'), lastJugyoByDay, this.value);
    });

    // 希望教室 → 開講クラス一覧 ＋ 希望日時プルダウン
    document.getElementById('classroom').addEventListener('change', async function () {
      const classroom = this.value;
      const section = document.getElementById('schedule-section');
      const spinner = document.getElementById('schedule-spinner');
      const list = document.getElementById('schedule-list');

      list.innerHTML = '';
      if (!classroom) {
        section.classList.add('hidden');
        applyPreferenceDropdownsForSchedule(null, true);
        return;
      }

      let effectiveClasses = FALLBACK_JUGYO_BY_CLASSROOM[classroom] || [];

      section.classList.remove('hidden');
      spinner.classList.remove('hidden');

      try {
        const res = await fetch(`${API_BASE}/api/jugyo?classroom=${encodeURIComponent(classroom)}`);
        const data = await res.json();
        const classes = Array.isArray(data?.classes) ? data.classes : [];
        if (!res.ok || !data.success) throw new Error('api');
        renderJugyoBadges(list, classes, false);
        if (classes.length) effectiveClasses = classes;
      } catch {
        const fb = FALLBACK_JUGYO_BY_CLASSROOM[classroom];
        if (fb && fb.length) {
          renderJugyoBadges(list, fb, true);
          effectiveClasses = fb;
        } else {
          list.innerHTML = '<span class="text-xs text-red-400">クラス情報の取得に失敗しました</span>';
          effectiveClasses = [];
        }
      } finally {
        spinner.classList.add('hidden');
      }

      const byDay = parseJugyoClassesToSchedule(effectiveClasses);
      applyPreferenceDropdownsForSchedule(byDay.size ? byDay : null, false);
    });

    applyPreferenceDropdownsForSchedule(null, true);

    // Toggle 級・段 field
    document.querySelectorAll('input[name="experience"]').forEach(radio => {
      radio.addEventListener('change', () => {
        const levelField = document.getElementById('level-field');
        levelField.classList.toggle('hidden', radio.value !== 'あり' || !radio.checked);
      });
    });

    // Form submission
    document.getElementById('taiken-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const errorBox = document.getElementById('error-box');
      errorBox.classList.add('hidden');
      errorBox.textContent = '';

      const familyName = document.getElementById('family-name').value.trim();
      const givenName = document.getElementById('given-name').value.trim();
      const furigana = document.getElementById('furigana').value.trim();
      const grade = document.getElementById('grade').value;
      const experience = document.querySelector('input[name="experience"]:checked').value;
      const levelIfAny = experience === 'あり' ? document.getElementById('level').value.trim() : '';
      const tel = document.getElementById('tel').value.trim();
      const email = document.getElementById('email').value.trim();
      const address = document.getElementById('address').value.trim();
      const classroom = document.getElementById('classroom').value;
      const pref1d = document.getElementById('pref1-date').value.trim();
      const pref1t = document.getElementById('pref1-time').value.trim();
      const pref2d = document.getElementById('pref2-date').value.trim();
      const pref2t = document.getElementById('pref2-time').value.trim();
      const preferredDatetime = mergePreferredDatetimeForKintone();
      const notes = document.getElementById('notes').value.trim();

      // Validation
      const errors = [];
      if (!familyName) errors.push('姓をご入力ください');
      if (!givenName) errors.push('名をご入力ください');
      if (!email) errors.push('メールアドレスをご入力ください');
      if (!classroom) errors.push('希望教室を選択してください');
      if (!pref1d || !pref1t) errors.push('第1希望の日付・時間を選択してください');
      if (!pref2d || !pref2t) errors.push('第2希望の日付・時間を選択してください');
      if (pref1d && pref1t && pref2d && pref2t && pref1d === pref2d && pref1t === pref2t) {
        errors.push('第1希望と第2希望は異なる日時をお選びください');
      }

      if (errors.length > 0) {
        errorBox.textContent = errors.join(' / ');
        errorBox.classList.remove('hidden');
        errorBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
      }

      const submitBtn = document.getElementById('submit-btn');
      const submitText = document.getElementById('submit-text');
      const submitSpinner = document.getElementById('submit-spinner');
      submitBtn.disabled = true;
      submitText.textContent = '送信中...';
      submitSpinner.classList.remove('hidden');

      try {
        const response = await fetch(`${API_BASE}/api/taiken`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            氏: familyName,
            名: givenName,
            フリガナ: furigana,
            学年: grade,
            電話番号: tel,
            メールアドレス: email,
            住所: address,
            そろばん経験: experience,
            '級・段': levelIfAny,
            教室名: classroom,
            希望日時: preferredDatetime,
            備考: notes,
          }),
        });

        if (!response.ok) {
          const data = await response.json().catch(() => ({}));
          throw new Error(data.error || data.message || `送信に失敗しました（${response.status}）`);
        }

        document.getElementById('form-card').classList.add('hidden');
        document.getElementById('success-screen').classList.remove('hidden');
        document.getElementById('success-screen').scrollIntoView({ behavior: 'smooth', block: 'center' });

      } catch (err) {
        errorBox.textContent = err.message || '送信中にエラーが発生しました。しばらく経ってから再度お試しください。';
        errorBox.classList.remove('hidden');
        errorBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
      } finally {
        submitBtn.disabled = false;
        submitText.textContent = '送信する';
        submitSpinner.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
